before:
  hooks:
    - make vendor
builds:
  - main: ./cmd/lmd-ng
    env:
      - CC="{{ .Env.PWD }}/hack/zcc.sh"
      - CXX="{{ .Env.PWD }}/hack/zcxx.sh"
      - CGO_ENABLED=1
    ldflags:
      - -s
      - -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    flags:
      - -trimpath
      - -a
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - 386
      - amd64
      - arm64
archives:
  - replacements:
      darwin: macos
      linux: linux
      windows: windows
      386: 32-bit
      amd64: 64-bit
      arm64: arm-64-bit
    format: zip
    files:
      - LICENSE
      - README.md
      - config.yaml.example
checksum:
  name_template: "checksums.txt"
snapshot:
  name_template: "{{ .Version }}"
changelog:
  filters:
    exclude:
      - "^docs:"
      - "^test:"
